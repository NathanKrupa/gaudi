name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        # uv does the install; enable-cache persists its wheel cache between
        # runs, keyed on pyproject.toml. --system below targets the
        # setup-python interpreter on PATH so ruff / pytest / bandit / the
        # gaudi console scripts keep resolving as bare commands.
        # (Transfer of grantspider PR #1276.)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        # uv does the install; enable-cache persists its wheel cache between
        # runs, keyed on pyproject.toml. --system below targets the
        # setup-python interpreter on PATH so ruff / pytest / bandit / the
        # gaudi console scripts keep resolving as bare commands.
        # (Transfer of grantspider PR #1276.)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Security scan (bandit)
        run: bandit -r src/ -c pyproject.toml

      - name: Upgrade runner pip past PYSEC-2026-196
        # The ubuntu runner image ships pip 26.1.1, which pip-audit flags
        # (fixed in 26.1.2). Nothing in the job uses pip, but pip-audit
        # audits the whole environment.
        run: uv pip install --system --upgrade "pip>=26.1.2"

      - name: Dependency audit
        run: pip-audit --skip-editable

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        # uv does the install; enable-cache persists its wheel cache between
        # runs, keyed on pyproject.toml. --system below targets the
        # setup-python interpreter on PATH so ruff / pytest / bandit / the
        # gaudi console scripts keep resolving as bare commands.
        # (Transfer of grantspider PR #1276.)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Test with coverage
        run: pytest --tb=short --cov=gaudi --cov-report=term-missing --cov-fail-under=60

      - name: Fixture corpus coverage
        run: gaudi-fixture-coverage --strict

      - name: Cheat-sheet drift guard
        run: gaudi cheat-sheet --check -o docs/gaudi-rules.md
