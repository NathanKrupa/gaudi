[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "gaudi"
version = "0.1.0"
description = "Not just structurally sound. Beautiful. A universal architecture linter for AI-assisted development."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Nathan Krupa", email = "54715560+NathanKrupa@users.noreply.github.com"},
]
keywords = ["linter", "architecture", "database", "schema", "ai", "claude", "code-quality"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Testing",
    "Topic :: Database",
]
dependencies = [
    "click>=8.0",
    "tomli>=2.0;python_version<'3.11'",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
]

[project.scripts]
gaudi = "gaudi.cli:main"

[project.entry-points."gaudi.packs"]
python = "gaudi.packs.python:PythonPack"
javascript = "gaudi.packs.javascript:JavaScriptPack"
go = "gaudi.packs.go:GoPack"
rust = "gaudi.packs.rust:RustPack"
java = "gaudi.packs.java:JavaPack"
csharp = "gaudi.packs.csharp:CSharpPack"
php = "gaudi.packs.php:PHPPack"
ruby = "gaudi.packs.ruby:RubyPack"
swift = "gaudi.packs.swift:SwiftPack"
kotlin = "gaudi.packs.kotlin:KotlinPack"
cpp = "gaudi.packs.cpp:CppPack"

[project.urls]
Homepage = "https://github.com/NathanKrupa/gaudi"
Repository = "https://github.com/NathanKrupa/gaudi"
Issues = "https://github.com/NathanKrupa/gaudi/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint.per-file-ignores]
"tests/fixtures/*" = ["F401", "F841", "E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
